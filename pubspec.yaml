name: todo_app
description: "A beautiful and intuitive To-Do List mobile application built with Flutter and Material 3 design."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Material 3 and UI
  google_fonts: ^6.1.0
  
  # State Management
  provider: ^6.1.0
  
  # Local Data Persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  # Assets (if needed in future)
  # assets:
  #   - assets/images/
  #   - assets/icons/
  
